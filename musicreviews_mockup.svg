      .card { fill: #1e293b; rx: 6px; }
      .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #ffffff; font-weight: 700; }
      .text-body { font-family: system-ui, -apple-system, sans-serif; font-size: 8px; fill: #94a3b8; }
