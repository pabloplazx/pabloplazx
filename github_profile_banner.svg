<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 240" width="100%">
  <defs>
    <style>
      .bg { fill: #0b0f19; }
      .grid { stroke: #1e293b; stroke-width: 0.5; opacity: 0.2; }
      .accent-glow { fill: url(#glow-grad); opacity: 0.45; }
      .pulse-glow { fill: url(#glow-grad-2); opacity: 0.25; animation: pulse 6s infinite alternate; }
      .text-title { font-family: system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 38px; fill: #ffffff; letter-spacing: 6px; }
      .text-subtitle { font-family: system-ui, -apple-system, sans-serif; font-weight: 300; font-size: 16px; fill: #38bdf8; letter-spacing: 4px; }
      .status-bg { fill: #10b981; fill-opacity: 0.1; stroke: #10b981; stroke-width: 1; }
      .status-text { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #10b981; letter-spacing: 1px; }
      .status-dot { fill: #10b981; animation: blink 1.8s infinite; }
      @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
      @keyframes pulse { 0% { transform: scale(1); opacity: 0.2; } 100% { transform: scale(1.1); opacity: 0.35; } }
    </style>
    <radialGradient id="glow-grad" cx="80%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-grad-2" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="850" height="240" rx="10" class="bg" />
  <circle cx="680" cy="100" r="280" class="accent-glow" />
  <circle cx="150" cy="160" r="180" class="pulse-glow" />
  <g class="grid">
    <path d="M 0,30 H 850 M 0,60 H 850 M 0,90 H 850 M 0,120 H 850 M 0,150 H 850 M 0,180 H 850 M 0,210 H 850" />
    <path d="M 50,0 V 240 M 100,0 V 240 M 150,0 V 240 M 200,0 V 240 M 250,0 V 240 M 300,0 V 240 M 350,0 V 240 M 400,0 V 240 M 450,0 V 240 M 500,0 V 240 M 550,0 V 240 M 600,0 V 240 M 650,0 V 240 M 700,0 V 240 M 750,0 V 240 M 800,0 V 240" />
  </g>
  <g transform="translate(425, 105)" text-anchor="middle">
    <text class="text-title">PABLO DE LA PLAZA</text>
  </g>
  <g transform="translate(425, 140)" text-anchor="middle">
    <text class="text-subtitle">FULL-STACK DEVELOPER</text>
  </g>
  <g transform="translate(425, 175)" text-anchor="middle">
    <rect x="-140" y="-15" width="280" height="26" rx="13" class="status-bg" />
    <circle cx="-120" cy="-2" r="4.5" class="status-dot" />
    <text x="-105" y="2" text-anchor="start" class="status-text">DISPONIBLE PARA INCORPORACIÓN</text>
  </g>
</svg>
